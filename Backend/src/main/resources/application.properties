server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/canteen_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=SmartCanteenV2SecretKey2024_MustBe256BitsLongForSecurity
app.jwt.expiration=86400000
app.cors.allowed-origin=http://localhost:5173

# Canteen Settings
canteen.max-orders-per-slot=20
canteen.slot-duration-minutes=10
canteen.peak-start=13:00
canteen.peak-end=14:00
